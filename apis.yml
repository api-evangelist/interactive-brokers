apis:
- aid: interactive-brokers:web-api
  name: Interactive Brokers Web API
  description: The Interactive Brokers Web API is a RESTful API that provides programmatic access to IBKR trading, portfolio
    management, market data, and account information. The API consolidates the Client Portal Web API, Digital Account Management,
    and Flex Web Service into a unified interface. It supports OAuth 2.0 authentication and provides endpoints for order placement,
    portfolio monitoring, real-time and historical market data, and account management across global markets.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://www.interactivebrokers.com/campus/ibkr-api-page/webapi-doc/
  baseURL: https://localhost:5000/v1/api

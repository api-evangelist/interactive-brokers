- aid: interactive-brokers:client-portal-api
  name: Interactive Brokers Client Portal API
  description: The Interactive Brokers Client Portal API is a REST API accessed through a locally running Java gateway that
    routes authenticated requests to IBKR systems. It provides a lightweight interface for trading, viewing portfolio information,
    accessing market data, and managing authentication. The API uses a two-tiered session structure with read-only and brokerage
    session levels.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://interactivebrokers.github.io/cpwebapi/
  baseURL: https://localhost:5000/v1/api

aid: interactive-brokers
name: Interactive Brokers
description: Interactive Brokers is an online brokerage firm providing trading access to stocks, options, futures, currencies,
  bonds, and funds across 150+ markets worldwide. IBKR offers comprehensive REST APIs that enable developers and traders to
  programmatically access trading, portfolio management, market data, and account management capabilities through the IBKR
  Web API and Client Portal API.
